server:
  port: 8081

spring:
  config:
    import:
    config server: http://localhost/:8085

  datasource:
    url: jdbc:mysql://localhost:3306/microservicess
    username: root
    password: Dev@1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: User-Service



  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect


